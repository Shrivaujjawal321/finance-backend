<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinanceApp - Login</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <h2>FinanceApp</h2>
            <p class="subtitle">Finance Data Processing Dashboard</p>

            <!-- Login Form -->
            <div id="login-form">
                <div class="form-group">
                    <label for="login-username">Username</label>
                    <input type="text" id="login-username" class="form-control" placeholder="Enter username">
                </div>
                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" class="form-control" placeholder="Enter password">
                </div>
                <button class="btn btn-primary" style="width:100%; margin-top:8px;" id="btn-login">Sign In</button>
                <p style="text-align:center; margin-top:16px; font-size:0.88rem; color:#6c757d;">
                    Don't have an account? <a href="#" id="show-register" style="color:var(--primary); text-decoration:none; font-weight:600;">Register</a>
                </p>
            </div>

            <!-- Register Form -->
            <div id="register-form" style="display:none;">
                <div class="form-group">
                    <label for="reg-fullname">Full Name</label>
                    <input type="text" id="reg-fullname" class="form-control" placeholder="Enter full name">
                </div>
                <div class="form-group">
                    <label for="reg-username">Username</label>
                    <input type="text" id="reg-username" class="form-control" placeholder="Choose a username">
                </div>
                <div class="form-group">
                    <label for="reg-email">Email</label>
                    <input type="email" id="reg-email" class="form-control" placeholder="Enter email">
                </div>
                <div class="form-group">
                    <label for="reg-password">Password</label>
                    <input type="password" id="reg-password" class="form-control" placeholder="Min 6 characters">
                </div>
                <div class="form-group">
                    <label for="reg-role">Role</label>
                    <select id="reg-role" class="form-control">
                        <option value="VIEWER">Viewer</option>
                        <option value="ANALYST">Analyst</option>
                        <option value="ADMIN">Admin</option>
                    </select>
                </div>
                <button class="btn btn-primary" style="width:100%; margin-top:8px;" id="btn-register">Create Account</button>
                <p style="text-align:center; margin-top:16px; font-size:0.88rem; color:#6c757d;">
                    Already have an account? <a href="#" id="show-login" style="color:var(--primary); text-decoration:none; font-weight:600;">Sign In</a>
                </p>
            </div>
        </div>
    </div>

    <div class="toast-container"></div>

    <script src="/js/api.js"></script>
    <script src="/js/common.js"></script>
    <script>
        // Redirect if already logged in
        if (isLoggedIn()) {
            const user = getUser();
            if (user.role === 'VIEWER') {
                window.location.href = '/records.html';
            } else {
                window.location.href = '/dashboard.html';
            }
        }

        // Toggle forms
        document.getElementById('show-register').addEventListener('click', (e) => {
            e.preventDefault();
            document.getElementById('login-form').style.display = 'none';
            document.getElementById('register-form').style.display = 'block';
        });
        document.getElementById('show-login').addEventListener('click', (e) => {
            e.preventDefault();
            document.getElementById('register-form').style.display = 'none';
            document.getElementById('login-form').style.display = 'block';
        });

        // Login
        document.getElementById('btn-login').addEventListener('click', async () => {
            const username = document.getElementById('login-username').value.trim();
            const password = document.getElementById('login-password').value;
            if (!username || !password) { showToast('Please fill all fields', 'error'); return; }

            try {
                const btn = document.getElementById('btn-login');
                btn.disabled = true; btn.textContent = 'Signing in...';
                const data = await Auth.login({ username, password });
                saveAuth(data);
                showToast('Login successful!', 'success');
                setTimeout(() => {
                    if (data.role === 'VIEWER') {
                        window.location.href = '/records.html';
                    } else {
                        window.location.href = '/dashboard.html';
                    }
                }, 500);
            } catch (err) {
                showToast(err.message, 'error');
                document.getElementById('btn-login').disabled = false;
                document.getElementById('btn-login').textContent = 'Sign In';
            }
        });

        // Register
        document.getElementById('btn-register').addEventListener('click', async () => {
            const fullName = document.getElementById('reg-fullname').value.trim();
            const username = document.getElementById('reg-username').value.trim();
            const email = document.getElementById('reg-email').value.trim();
            const password = document.getElementById('reg-password').value;
            const role = document.getElementById('reg-role').value;

            if (!fullName || !username || !email || !password) { showToast('Please fill all fields', 'error'); return; }

            try {
                const btn = document.getElementById('btn-register');
                btn.disabled = true; btn.textContent = 'Creating account...';
                const data = await Auth.register({ fullName, username, email, password, role });
                saveAuth(data);
                showToast('Account created!', 'success');
                setTimeout(() => {
                    if (data.role === 'VIEWER') {
                        window.location.href = '/records.html';
                    } else {
                        window.location.href = '/dashboard.html';
                    }
                }, 500);
            } catch (err) {
                showToast(err.message, 'error');
                document.getElementById('btn-register').disabled = false;
                document.getElementById('btn-register').textContent = 'Create Account';
            }
        });

        // Enter key support
        document.getElementById('login-password').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') document.getElementById('btn-login').click();
        });
        document.getElementById('reg-password').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') document.getElementById('btn-register').click();
        });
    </script>
</body>
</html>
